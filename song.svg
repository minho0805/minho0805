<svg width="320" height="445" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-labelledby="cardTitle" role="img">
    <title id="cardTitle">Now playing on Spotify</title>
    <foreignObject width="320" height="445">
        <style>
            div {
            font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif, Apple Color Emoji, Segoe UI Emoji;
            }

            .container {
            background-color: #05070b;
            border-radius: 18px;
            padding: 18px 18px 20px 18px;
            width: 284px;
            height: 409px;
            box-shadow: 0 0 18px rgba(106, 13, 173, 0.7);
            }

            .top {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            }

            .np-text {
            color: #1DB954;
            font-weight: 600;
            font-size: 16px;
            margin-right: 6px;
            }

            .spotify-icon {
            width: 20px;
            height: 20px;
            }

            .title {
            text-align: center;
            color: #ffffff;
            font-weight: 800;
            font-size: 22px;
            margin-top: 6px;
            }

            .artist {
            text-align: center;
            color: #cccccc;
            font-size: 15px;
            margin-top: 2px;
            margin-bottom: 10px;
            }

            .wave {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 24px;
            margin-bottom: 6px;
            }

            .wave-bar {
            width: 3px;
            border-radius: 2px;
            background-color: #1DB954;
            animation: sound 1.2s linear infinite;
            }

            .wave-bar:nth-child(odd) {
            animation-duration: 1.1s;
            }

            .wave-bar:nth-child(even) {
            animation-duration: 1.4s;
            }

            @keyframes sound {
            0%   { height: 4px; opacity: 0.4; }
            50%  { height: 22px; opacity: 1; }
            100% { height: 4px; opacity: 0.4; }
            }

            .cover {
            width: 100%;
            height: auto;
            border-radius: 10px;
            margin-top: 2px;
            object-fit: cover;
            }
        </style>

        <div xmlns="http://www.w3.org/1999/xhtml" class="container">

            <!-- 상단 Now playing + Spotify 로고 -->
            <div class="top">
                <span class="np-text">Now playing on</span>
                <img class="spotify-icon" src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" alt="Spotify" />
            </div>

            <!-- 곡 제목 / 아티스트 -->
            <div class="title">Slow Dancing</div>
            <div class="artist">V</div>

            <!-- 초록 파형 바 -->
            <div class="wave">
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            </div>

            <!-- 앨범 커버 (레포 루트에 slowdancing.png 필요) -->
            <img class="cover"
                 src="slowdancing.png"
                 alt="Slow Dancing cover" />

        </div>
    </foreignObject>
</svg>