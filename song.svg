<svg fill="none" viewBox="0 0 320 445" width="320" height="445" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="320" height="445">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
                @keyframes sound {
                0% { height: 10px; }
                50% { height: 50px; }
                100% { height: 10px; }
                }
                .container {
                background-color: #121212;
                border-radius: 15px;
                color: white;
                font-family: sans-serif;
                padding: 20px;
                width: 280px;
                height: 405px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                }
                .title {
                color: #1DB954;
                font-weight: bold;
                font-size: 18px;
                }
                .song {
                font-size: 22px;
                font-weight: bold;
                margin-top: 10px;
                }
                .artist {
                font-size: 16px;
                color: #bbb;
                }
                .bars {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
                height: 50px;
                margin-top: 20px;
                }
                .bar {
                width: 3px;
                background-color: #1DB954;
                animation: sound 1.2s infinite;
                animation-delay: calc(var(--i) * 0.05s);
                }
                .cover {
                border-radius: 10px;
                width: 100%;
                margin-top: 20px;
                }
            </style>

            <div class="container">
                <div>
                    <div class="title">Now Playing on Spotify</div>
                    <div class="song">Runaway</div>
                    <div class="artist">Kanye West</div>
                </div>

                <img class="cover"
                     src="https://i.scdn.co/image/ab67616d0000b273e0b6c1e7fddc91eb0a43f8c8"
                     alt="Runaway cover"/>

                <div class="bars">
                    <div class="bar" style="--i:1"></div>
                    <div class="bar" style="--i:2"></div>
                    <div class="bar" style="--i:3"></div>
                    <div class="bar" style="--i:4"></div>
                    <div class="bar" style="--i:5"></div>
                    <div class="bar" style="--i:6"></div>
                    <div class="bar" style="--i:7"></div>
                    <div class="bar" style="--i:8"></div>
                    <div class="bar" style="--i:9"></div>
                    <div class="bar" style="--i:10"></div>
                </div>
            </div>
        </div>
    </foreignObject>
</svg>